services:
  - type: web
    name: upwork-pipeline
    env: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: APIFY_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: APP_BASE_URL
        value: https://upwork-pipeline.onrender.com