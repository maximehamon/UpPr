{% extends "base.html" %}
{% block title %}Dashboard — UpPr{% endblock %}

{% block content %}

<h1>Dashboard</h1>

<!-- Scrape form -->
<section class="card">
    <h2>Find Upwork Jobs</h2>
    <form id="scrape-form">
        <div class="form-group">
            <label for="keywords">Search Keywords (one per line or comma-separated)</label>
            <textarea id="keywords" rows="3" placeholder="python developer&#10;web scraping&#10;react freelancer"></textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="max-jobs">Max Jobs</label>
                <input type="number" id="max-jobs" value="50" min="1" max="500">
            </div>
            <div class="form-group">
                <label for="job-type">Job Type</label>
                <select id="job-type">
                    <option value="hourly">Hourly</option>
                    <option value="fixed">Fixed Price</option>
                </select>
            </div>
        </div>

        <!-- Advanced Options Toggle -->
        <button type="button" class="btn btn-sm" id="advanced-toggle" onclick="toggleAdvanced()" style="margin-bottom:12px">
            Show Advanced Options
        </button>

        <div id="advanced-options" style="display:none">
            <div class="form-group">
                <label for="raw-url">Raw Upwork URL <span class="muted">(overrides keywords)</span></label>
                <input type="text" id="raw-url" placeholder="https://www.upwork.com/nx/search/jobs/?q=...">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="sort">Sort By</label>
                    <select id="sort">
                        <option value="newest">Newest</option>
                        <option value="relevance">Relevance</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Experience Level</label>
                    <div style="display:flex;gap:12px;padding-top:4px">
                        <label style="font-weight:normal;font-size:13px"><input type="checkbox" value="entry" class="exp-level"> Entry</label>
                        <label style="font-weight:normal;font-size:13px"><input type="checkbox" value="intermediate" class="exp-level"> Intermediate</label>
                        <label style="font-weight:normal;font-size:13px"><input type="checkbox" value="expert" class="exp-level"> Expert</label>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="max-age-value">Max Job Age</label>
                    <input type="number" id="max-age-value" placeholder="e.g. 2" min="1">
                </div>
                <div class="form-group">
                    <label for="max-age-unit">Unit</label>
                    <select id="max-age-unit">
                        <option value="HOURS" selected>Hours</option>
                        <option value="MINUTES">Minutes</option>
                        <option value="DAYS">Days</option>
                        <option value="WEEKS">Weeks</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="budget-min">Fixed Budget Min ($)</label>
                    <input type="number" id="budget-min" placeholder="0" min="0">
                </div>
                <div class="form-group">
                    <label for="budget-max">Fixed Budget Max ($)</label>
                    <input type="number" id="budget-max" placeholder="Any" min="0">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="hourly-min">Hourly Rate Min ($/hr)</label>
                    <input type="number" id="hourly-min" placeholder="0" min="0">
                </div>
                <div class="form-group">
                    <label for="hourly-max">Hourly Rate Max ($/hr)</label>
                    <input type="number" id="hourly-max" placeholder="Any" min="0">
                </div>
            </div>

            <div class="form-group">
                <label for="locations">Locations <span class="muted">(comma-separated)</span></label>
                <input type="text" id="locations" placeholder="United States, United Kingdom, Canada">
            </div>

            <div class="form-group">
                <label style="font-weight:normal;font-size:13px"><input type="checkbox" id="payment-verified"> Payment Verified Only</label>
            </div>

            <!-- Custom Filters -->
            <div class="form-group">
                <label>Custom Filters</label>
                <div id="custom-filters-list"></div>
                <button type="button" class="btn btn-sm" onclick="addCustomFilter()">+ Add Filter</button>
            </div>
        </div>

        <button type="submit" class="btn btn-primary" id="scrape-btn">Start Scrape</button>
    </form>
</section>

<!-- Status bar -->
<div id="config-status" class="config-bar">
    <span class="config-item"><span class="status-dot" id="apify-status"></span> Apify</span>
    <span class="config-item"><span class="status-dot" id="openrouter-status"></span> OpenRouter</span>
    <span class="config-item"><span class="status-dot" id="slack-status"></span> Slack</span>
</div>

<!-- Scrape list -->
<section class="card">
    <div class="flex-between">
        <h2>Scrapes</h2>
        <div class="flex-gap" style="align-items:center">
            <span id="auto-scrape-status" class="muted" style="font-size:13px"></span>
            <button class="btn btn-sm" id="auto-scrape-toggle" onclick="toggleAutoScrape()" style="display:none"></button>
            <button class="btn btn-sm" onclick="triggerAutoScrape()">Run Auto-Scrape</button>
            <button class="btn btn-sm" onclick="clearSeenJobs()">Clear History</button>
        </div>
    </div>
    <div id="scrapes-list">
        <p class="muted">Loading...</p>
    </div>
</section>

<!-- Results detail panel (hidden by default) -->
<section class="card" id="results-panel" style="display:none">
    <div class="panel-header">
        <h2>Results — <span id="results-title"></span></h2>
        <button class="btn btn-sm" onclick="document.getElementById('results-panel').style.display='none'">Close</button>
    </div>
    <div class="results-meta">
        <span id="results-count"></span> jobs found ·
        Keywords: <span id="results-keywords"></span>
    </div>
    <div id="results-grid"></div>
</section>

{% endblock %}

{% block scripts %}
<script>

// --- Config status check ---
async function checkConfig() {
    try {
        const s = await api('/api/config-status');
        setDot('#apify-status', s.apify_configured);
        setDot('#openrouter-status', s.openrouter_configured);
        setDot('#slack-status', s.slack_configured);
    } catch (e) {}
}

function setDot(sel, ok) {
    const el = $(sel);
    el.className = 'status-dot ' + (ok ? 'status-ok' : 'status-missing');
    el.title = ok ? 'Configured' : 'Not configured';
}

// --- Advanced options toggle ---
function toggleAdvanced() {
    const panel = $('#advanced-options');
    const btn = $('#advanced-toggle');
    if (panel.style.display === 'none') {
        panel.style.display = 'block';
        btn.textContent = 'Hide Advanced Options';
    } else {
        panel.style.display = 'none';
        btn.textContent = 'Show Advanced Options';
    }
}

// --- Custom filters ---
function addCustomFilter() {
    const list = $('#custom-filters-list');
    const row = document.createElement('div');
    row.className = 'form-row';
    row.style.marginBottom = '8px';
    row.innerHTML = `
        <div class="form-group">
            <select class="cf-key">
                <option value="title">Title</option>
                <option value="description">Description</option>
                <option value="jobType">Job Type</option>
                <option value="experienceLevel">Experience Level</option>
                <option value="budget">Budget</option>
                <option value="tags">Tags</option>
            </select>
        </div>
        <div class="form-group">
            <select class="cf-op">
                <option value="includes">includes</option>
                <option value="equals">equals</option>
                <option value="notIncludes">not includes</option>
                <option value="notEquals">not equals</option>
            </select>
        </div>
        <div class="form-group">
            <input type="text" class="cf-val" placeholder="value">
        </div>
        <button type="button" class="btn btn-sm" onclick="this.parentElement.remove()" style="align-self:flex-end;margin-bottom:14px">Remove</button>
    `;
    list.appendChild(row);
}

// --- Scrape form ---
$('#scrape-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const raw = $('#keywords').value.trim();
    const rawUrl = $('#raw-url').value.trim();
    if (!raw && !rawUrl) return;

    const keywords = raw.includes('\n')
        ? raw.split('\n').map(k => k.trim()).filter(Boolean)
        : raw.split(',').map(k => k.trim()).filter(Boolean);

    const maxJobs = parseInt($('#max-jobs').value) || 50;
    const jobType = $('#job-type').value;

    // Build request body
    const body = { keywords: keywords.length ? keywords : [''], max_jobs: maxJobs, job_type: jobType };

    // Advanced options - only include if set
    if (rawUrl) body.raw_url = rawUrl;

    const sort = $('#sort').value;
    if (sort && sort !== 'newest') body.sort = sort;
    else body.sort = 'newest';

    const expLevels = [...document.querySelectorAll('.exp-level:checked')].map(el => el.value);
    if (expLevels.length) body.experience_level = expLevels;

    const ageVal = parseInt($('#max-age-value').value);
    if (ageVal > 0) {
        body.max_job_age_value = ageVal;
        body.max_job_age_unit = $('#max-age-unit').value;
    }

    const budgetMin = parseInt($('#budget-min').value);
    if (budgetMin > 0) body.budget_min = budgetMin;
    const budgetMax = parseInt($('#budget-max').value);
    if (budgetMax > 0) body.budget_max = budgetMax;

    const hourlyMin = parseInt($('#hourly-min').value);
    if (hourlyMin > 0) body.hourly_budget_min = hourlyMin;
    const hourlyMax = parseInt($('#hourly-max').value);
    if (hourlyMax > 0) body.hourly_budget_max = hourlyMax;

    const locRaw = $('#locations').value.trim();
    if (locRaw) body.locations = locRaw.split(',').map(l => l.trim()).filter(Boolean);

    const pvCheckbox = $('#payment-verified');
    if (pvCheckbox.checked) body.payment_verified = true;

    // Custom filters
    const filterRows = document.querySelectorAll('#custom-filters-list .form-row');
    if (filterRows.length) {
        const filters = [];
        filterRows.forEach(row => {
            const key = row.querySelector('.cf-key').value;
            const operator = row.querySelector('.cf-op').value;
            const value = row.querySelector('.cf-val').value.trim();
            if (value) filters.push({ key, operator, value });
        });
        if (filters.length) body.custom_filters = filters;
    }

    const btn = $('#scrape-btn');
    btn.disabled = true;
    btn.textContent = 'Starting...';

    try {
        const res = await api('/api/scrapes', {
            method: 'POST',
            body: JSON.stringify(body),
        });
        toast('Scrape started! Polling in background...', 'success');
        $('#keywords').value = '';
    } catch (err) {
        toast(err.message, 'error');
    }

    btn.disabled = false;
    btn.textContent = 'Start Scrape';
    loadScrapes();
});

// --- Load scrapes ---
async function loadScrapes() {
    try {
        const scrapes = await api('/api/scrapes');
        const html = scrapes.length === 0
            ? '<p class="muted">No scrapes yet. Start one above!</p>'
            : `<table class="table">
                <thead><tr>
                    <th>ID</th><th>Keywords</th><th>Jobs</th><th>Status</th><th>Created</th><th></th>
                </tr></thead>
                <tbody>${scrapes.map(s => `
                    <tr>
                        <td>#${s.id}</td>
                        <td>${escapeHtml((s.keywords || []).slice(0, 3).join(', '))}${s.keywords?.length > 3 ? '...' : ''}</td>
                        <td>${s.new_count !== undefined && s.new_count !== null ? `<strong>${s.new_count} new</strong> / ${s.result_count || 0}` : (s.result_count || '-')}</td>
                        <td><span class="badge badge-${s.status}">${escapeHtml(s.status)}${s.error_message ? ' !' : ''}</span></td>
                        <td>${s.created_at?.replace('T', ' ').slice(0, 19) || ''}</td>
                        <td>
                            ${s.error_message ? `<span class="muted" title="${escapeHtml(s.error_message)}">error</span> ` : ''}
                            ${s.status === 'completed' ? `<button class="btn btn-sm" onclick="viewResults(${s.id})">View</button>` : ''}
                            ${s.status === 'running' || s.status === 'pending' ? `<button class="btn btn-sm" onclick="refreshScrape(${s.id})">Refresh</button>` : ''}
                        </td>
                    </tr>`).join('')}</tbody></table>`;
        $('#scrapes-list').innerHTML = html;
    } catch (err) {
        $('#scrapes-list').innerHTML = `<p class="error">Failed to load: ${err.message}</p>`;
    }
}

// --- View results ---
async function viewResults(id) {
    try {
        const scrape = await api(`/api/scrapes/${id}`);
        const results = scrape.results || [];

        $('#results-title').textContent = `Scrape #${id}`;
        $('#results-count').textContent = results.length;
        $('#results-keywords').textContent = (scrape.keywords || []).join(', ');

        const grid = $('#results-grid');
        if (results.length === 0) {
            grid.innerHTML = '<p class="muted">No jobs found in this scrape.</p>';
        } else {
            grid.innerHTML = results.map((job, i) => {
                const score = job._score || 0;
                const scoreColor = score >= 80 ? 'var(--success)' : score >= 50 ? 'var(--warning)' : 'var(--danger)';
                const scoreClass = score >= 80 ? 'badge-success' : score >= 50 ? 'badge-warning' : 'badge-danger';
                return `
                <div class="job-card card">
                    <div class="flex-start">
                        <h3 class="job-title"><a href="${escapeHtml(job.url || job.listingUrl || '#')}" target="_blank">${escapeHtml(job.title || 'Untitled')}</a></h3>
                        <span class="score-pill ${scoreClass}">
                            <span class="score-fill"><span class="score-fill-inner" style="width:${score}%;background:${scoreColor}"></span></span>
                            ${score}
                        </span>
                    </div>
                    <div class="job-meta">
                        <span class="badge">${escapeHtml(job.jobType || 'N/A')}</span>
                        <span>${escapeHtml(job.budget || 'Not specified')}</span>
                        <span>${escapeHtml(job.clientCountry || 'Unknown')}</span>
                    </div>
                    <p class="job-desc">${escapeHtml((job.description || '').slice(0, 300))}${(job.description || '').length > 300 ? '...' : ''}</p>
                    <div class="flex-gap">
                        <button class="btn btn-secondary" onclick="generateProposal(event, ${id}, ${i})">Generate Proposal</button>
                        <button class="btn btn-sm" onclick="saveToNotion(${id}, ${i})" title="Save to Notion">Save</button>
                    </div>
                </div>`;
            }).join('');
        }

        $('#results-panel').style.display = 'block';
        $('#results-panel').scrollIntoView({ behavior: 'smooth' });
    } catch (err) {
        toast(err.message, 'error');
    }
}

// --- Generate proposal ---
async function generateProposal(e, scrapeId, jobIndex) {
    try {
        const scrape = await api(`/api/scrapes/${scrapeId}`);
        const job = scrape.results[jobIndex];
        const btn = e.target;
        btn.disabled = true;
        btn.textContent = 'Generating...';

        const res = await api('/api/proposals', {
            method: 'POST',
            body: JSON.stringify({ job_data: job }),
        });

        toast('Proposal generated!', 'success');
        btn.textContent = 'Drafted';
    } catch (err) {
        toast(err.message, 'error');
        e.target.disabled = false;
        e.target.textContent = 'Generate Proposal';
    }
}

// --- Refresh scrape ---
async function refreshScrape(id) {
    try {
        const res = await api(`/api/scrapes/${id}/refresh`, { method: 'POST' });
        toast(`Status: ${res.status}`, 'info');
        loadScrapes();
        if (res.status === 'completed') {
            viewResults(id);
        }
    } catch (err) {
        toast(err.message, 'error');
    }
}

// --- Trigger auto-scrape ---
async function triggerAutoScrape() {
    try {
        const res = await api('/api/cron/trigger', { method: 'POST' });
        toast('Auto-scrape triggered!', 'success');
        loadScrapes();
    } catch (err) {
        toast(err.message, 'error');
    }
}

// --- Clear seen jobs ---
async function clearSeenJobs() {
    if (!confirm('Clear all seen jobs? Next scrape will show all jobs again.')) return;
    try {
        await api('/api/seen-jobs/clear', { method: 'POST' });
        toast('Seen jobs cleared!', 'info');
    } catch (err) {
        toast(err.message, 'error');
    }
}

// --- Save to Notion ---
async function saveToNotion(scrapeId, jobIndex) {
    try {
        const res = await api(`/api/jobs/${scrapeId}/${jobIndex}/save-to-notion`, { method: 'POST' });
        if (res.ok) {
            toast('Saved to Notion!', 'success');
        } else {
            toast('Failed to save', 'error');
        }
    } catch (err) {
        if (err.message.includes('Notion not configured')) {
            toast('Configure Notion in Settings first', 'error');
        } else {
            toast(err.message, 'error');
        }
    }
}

// --- Auto-scrape status ---
let _autoScrapeEnabled = false;

async function loadAutoScrapeStatus() {
    try {
        const s = await api('/api/settings');
        _autoScrapeEnabled = (s.auto_scrape_enabled || 'false') === 'true';
        const interval = parseInt(s.auto_scrape_interval || '60');
        const statusEl = $('#auto-scrape-status');
        const toggleBtn = $('#auto-scrape-toggle');

        let intervalLabel;
        if (interval < 60) intervalLabel = interval + 'min';
        else if (interval === 60) intervalLabel = '1h';
        else if (interval < 1440) intervalLabel = (interval / 60) + 'h';
        else intervalLabel = '24h';

        if (_autoScrapeEnabled) {
            statusEl.textContent = 'Auto-scrape: every ' + intervalLabel;
            statusEl.style.color = 'var(--success, #22c55e)';
            toggleBtn.textContent = 'Disable';
            toggleBtn.className = 'btn btn-sm';
        } else {
            statusEl.textContent = 'Auto-scrape: off';
            statusEl.style.color = '';
            toggleBtn.textContent = 'Enable';
            toggleBtn.className = 'btn btn-sm';
        }
        toggleBtn.style.display = '';
    } catch (e) {}
}

async function toggleAutoScrape() {
    const newVal = _autoScrapeEnabled ? 'false' : 'true';
    try {
        await api('/api/settings', {
            method: 'POST',
            body: JSON.stringify({ auto_scrape_enabled: newVal }),
        });
        toast(_autoScrapeEnabled ? 'Auto-scrape disabled' : 'Auto-scrape enabled', 'success');
        await loadAutoScrapeStatus();
    } catch (err) {
        toast(err.message, 'error');
    }
}

// --- Init ---
checkConfig();
loadScrapes();
loadAutoScrapeStatus();
setInterval(loadScrapes, 15000);
</script>
{% endblock %}
